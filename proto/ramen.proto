syntax = "proto3";

package ramen.v1;

import "google/protobuf/timestamp.proto";

// =============================================================================
// RAMEN Service - Real-time Asynchronous Messaging via ENgagement
// =============================================================================
// This service provides bidirectional streaming for real-time event delivery
// to mobile SDKs. It follows Uber's RAMEN architecture principles.

service RAMENService {
  // Subscribe opens a persistent bidirectional stream for event delivery.
  // The client sends SubscribeRequest initially, then Acks.
  // The server streams EventEnvelopes to the client.
  rpc Subscribe(stream ClientMessage) returns (stream ServerMessage);
  
  // Replay fetches historical events after a given sequence number.
  // Used when a client reconnects and needs to catch up.
  rpc Replay(ReplayRequest) returns (ReplayResponse);
}

// =============================================================================
// Client -> Server Messages
// =============================================================================

message ClientMessage {
  oneof message {
    SubscribeRequest subscribe = 1;
    Ack ack = 2;
    Heartbeat heartbeat = 3;
  }
}

// SubscribeRequest is sent once when opening a stream.
message SubscribeRequest {
  // JWT or SDK token for authentication
  string token = 1;
  
  // Unique device identifier (e.g., IDFV for iOS, Android ID)
  string device_id = 2;
  
  // Application identifier
  string app_id = 3;
  
  // User identifier
  string user_id = 4;
  
  // Last successfully processed sequence number (for replay)
  int64 last_seq = 5;
  
  // Optional: Filter events by provider (e.g., "whoop", "garmin")
  repeated string providers = 6;
  
  // Optional: Filter events by type (e.g., "sleep.updated")
  repeated string event_types = 7;
}

// Ack acknowledges successful processing of an event.
message Ack {
  // The sequence number being acknowledged
  int64 seq = 1;
  
  // Optional: Processing status
  AckStatus status = 2;
}

enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  ACK_STATUS_SUCCESS = 1;
  ACK_STATUS_FAILED = 2;
  ACK_STATUS_SKIPPED = 3;
}

// Heartbeat keeps the connection alive.
message Heartbeat {
  // Client's current timestamp
  google.protobuf.Timestamp timestamp = 1;
}

// =============================================================================
// Server -> Client Messages
// =============================================================================

message ServerMessage {
  oneof message {
    SubscribeResponse subscribe_response = 1;
    EventEnvelope event = 2;
    HeartbeatAck heartbeat_ack = 3;
    Error error = 4;
  }
}

// SubscribeResponse confirms subscription setup.
message SubscribeResponse {
  // Connection ID for this stream session
  string connection_id = 1;
  
  // Session expiry time
  google.protobuf.Timestamp expires_at = 2;
  
  // Server's heartbeat interval expectation
  int32 heartbeat_interval_seconds = 3;
  
  // Current highest sequence number for this user
  int64 current_seq = 4;
}

// EventEnvelope wraps a single event for delivery.
message EventEnvelope {
  // Unique event identifier
  string event_id = 1;
  
  // Monotonic sequence number within the user's stream
  int64 seq = 2;
  
  // Provider (e.g., "whoop", "garmin")
  string provider = 3;
  
  // Event type (e.g., "sleep.updated", "recovery.updated")
  string event_type = 4;
  
  // Reference to raw payload (can be fetched via Wear Service)
  string raw_id = 5;
  
  // Inline payload (if small enough, < 4KB)
  bytes payload = 6;
  
  // Event creation timestamp
  google.protobuf.Timestamp created_at = 7;
  
  // Delivery metadata
  DeliveryMeta delivery = 8;
}

message DeliveryMeta {
  // Number of delivery attempts
  int32 attempt = 1;
  
  // First delivery attempt timestamp
  google.protobuf.Timestamp first_sent_at = 2;
  
  // Whether this is a replay (historical) event
  bool is_replay = 3;
}

// HeartbeatAck acknowledges a client heartbeat.
message HeartbeatAck {
  google.protobuf.Timestamp server_time = 1;
  
  // Round-trip time observed by server
  int64 rtt_ms = 2;
}

// Error represents a stream-level or event-level error.
message Error {
  ErrorCode code = 1;
  string message = 2;
  bool fatal = 3; // If true, client should reconnect
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_AUTH_FAILED = 1;
  ERROR_CODE_RATE_LIMITED = 2;
  ERROR_CODE_INTERNAL = 3;
  ERROR_CODE_STREAM_CLOSED = 4;
}

// =============================================================================
// Replay RPC
// =============================================================================

message ReplayRequest {
  string app_id = 1;
  string user_id = 2;
  int64 after_seq = 3;
  int32 limit = 4; // Max 1000
}

message ReplayResponse {
  repeated EventEnvelope events = 1;
  bool has_more = 2;
  int64 highest_seq = 3;
}
