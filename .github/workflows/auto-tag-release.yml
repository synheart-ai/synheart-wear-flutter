name: Auto-tag release

on:
  push:
    branches: [release]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the tag push later in this workflow triggers
          # publish.yml. Tags pushed using the default GITHUB_TOKEN do not
          # trigger downstream workflows (GitHub's loop-prevention rule).
          # Falls back to github.token when PUBLISH_PAT isn't set so this
          # workflow keeps working in repos that haven't configured the
          # secret yet; auto-publish kicks in once it lands.
          token: ${{ secrets.PUBLISH_PAT || github.token }}

      - name: Read pubspec version
        id: ver
        run: |
          version=$(awk '/^version:/ {gsub(/[ \r]/,"",$2); print $2; exit}' pubspec.yaml)
          if [ -z "$version" ]; then
            echo "::error::Could not read version from pubspec.yaml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tag="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin; skipping. Bump pubspec version to cut a new release."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
